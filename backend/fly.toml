# Fly.io deployment config
app = "nova-cards-server"
primary_region = "sin"  # Singapore — low latency for Asia

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "2567"
  NODE_ENV = "production"

[[services]]
  internal_port = 2567
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.http_checks]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
